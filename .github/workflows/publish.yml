name: Publish to npm

# Triggers on every pushed git tag that starts with "v" (e.g. v1.0.1, v2.0.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # 1. Check out the repo at the tagged commit
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js and point npm at the public registry
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # 3. Install production dependencies only
      - name: Install dependencies
        run: npm ci --omit=dev

      # 4. Publish to npm
      #    NPM_TOKEN must be set as a GitHub Secret:
      #    Repo → Settings → Secrets → Actions → New repository secret
      #    Name: NPM_TOKEN  Value: <your npm access token>
      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
